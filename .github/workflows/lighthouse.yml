name: Lighthouse CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - run: vp install

      # Build at the default base ("/") so the preview server serves the
      # SPA at the workflow's localhost root. The Pages deploy workflow
      # sets BASE_URL to the repo path; that prefix isn't right for LHCI.
      - run: vp build

      # SPA fallback — mirrors deploy.yml so deep-link routes resolve via
      # 404.html if Vite's preview history fallback ever misses.
      - run: cp dist/index.html dist/404.html

      - name: Start preview server
        run: vp preview --host 127.0.0.1 --port 4173 &

      - name: Wait for preview
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/ >/dev/null; then
              echo "preview ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "preview never came up"; exit 1

      - uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:4173/
            http://127.0.0.1:4173/library
            http://127.0.0.1:4173/library/nhat-pham-ky
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false
